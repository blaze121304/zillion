version: '3.8'

services:
  zillion:
    build: .
    container_name: zillion
    ports:
      - "10002:10002"
    environment:
      - TZ=Asia/Seoul
      - API_PORT=10002
    volumes:
      - /home/rusty-linux/zillion/data:/app/data
      - /home/rusty-linux/zillion/report:/app/report
      - /home/rusty-linux/zillion/src:/app/src
    restart: always

